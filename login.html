<html lang="es">
  <head>
    <title>Login - Xonix Pro Revolution</title>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="images/favicon.ico" />
    <link rel="stylesheet" type="text/css" href="style/style.css" />
    <script type="text/javascript" src="scripts/jquery-3.3.1.min.js"></script>
    <script src="https://raw.githack.com/composite/jQuery.MsgBox/master/jquery.msgbox.min.js"></script>
  </head>
  <body
    style="
      background-color: #272626;
      color: #fff;
      font-family: 'Cousine', monospace;
    ">
    <div id="login-screen" style="text-align: center; margin-top: 120px">
      <img src="images/neo.svg" width="140" alt="logo" />
      <h1 style="color: var(--neon-accent-blue); margin-top: 20px">
        PLAYER LOGIN
      </h1>

      <form id="login-form" style="margin-top: 25px">
        <input
          type="text"
          id="username"
          placeholder="Enter Nickname"
          required
          class="neon-input" />
        <br /><br />
        <button
          type="submit"
          style="
            padding: 12px 30px;
            cursor: pointer;
            background: var(--gradient-primary);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 4px;
          ">
          START MISSION
        </button>
      </form>
      <p style="margin-top: 20px">
        <a
          href="index.html"
          style="color: var(--neon-accent-pink); text-decoration: none"
          >← Back to Home</a
        >
      </p>
    </div>

    <div
      id="loading-screen"
      style="display: none; text-align: center; margin-top: 150px">
      <h1 style="color: var(--neon-accent-pink)">PREPARING ENVIRONMENT...</h1>
      <p>Loading sectors...</p>
    </div>

    <script>
      $(document).ready(function () {
        // Si ya está logueado, ir directo al juego
        if (localStorage.getItem('xonix_user')) {
          window.location.href = 'game.html';
        }

        $('#login-form').on('submit', function (e) {
          e.preventDefault();
          const username = $('#username').val().trim();

          // REGEX: Letras, números, punto y espacio. Min 3, Max 12.
          const nicknameRegex = /^[a-zA-Z0-9. ]{3,12}$/;

          if (!nicknameRegex.test(username)) {
            $.msgbox(
              'Nickname no válido. Usa letras, números, puntos y espacios (3-12 caracteres).',
            );
            return;
          }

          // Guardar usuario
          localStorage.setItem(
            'xonix_user',
            JSON.stringify({
              username: username,
              bestScore: 0,
            }),
          );

          // Efecto visual de carga
          $('#login-screen').hide();
          $('#loading-screen').fadeIn();

          setTimeout(function () {
            window.location.href = 'game.html';
          }, 1500);
        });
      });
    </script>
  </body>
</html>

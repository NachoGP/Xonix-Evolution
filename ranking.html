<html lang="en">
  <head>
    <title>Xonix Ranking</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico" />
    <link rel="stylesheet" type="text/css" href="style/style.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Cousine:400,700"
      rel="stylesheet" />
    <script type="text/javascript" src="scripts/jquery-3.3.1.min.js"></script>
    <script src="https://use.fontawesome.com/8dd2d21d1f.js"></script>
  </head>
  <body style="background-color: #272626; color: #fff; font-family: 'Cousine'">
    <div class="wrapper">
      <div style="text-align: center; margin-top: 50px; margin-bottom: 10px">
        <img src="images/neo.svg" style="width: 100px" alt="logo" />
      </div>
      <h1 style="text-align: center">- TOP 5 PLAYERS -</h1>
      <div
        id="ranking-container"
        style="
          max-width: 600px;
          margin: 0 auto;
          background: #000;
          padding: 20px;
          border: 1px solid var(--neon-accent-blue);
          box-shadow: 0 0 15px var(--neon-accent-blue);
        ">
        <table style="width: 100%; border-collapse: collapse">
          <thead>
            <tr
              style="
                border-bottom: 2px solid var(--neon-accent-pink);
                color: var(--neon-accent-pink);
              ">
              <th style="padding: 10px">POS</th>
              <th>PLAYER</th>
              <th>SCORE</th>
              <th>DATE</th>
            </tr>
          </thead>
          <tbody id="ranking-body">
            <!-- Se llena con JS -->
          </tbody>
        </table>
      </div>
      <div class="backtogame">
        <a href="game.html?from=menu"
          ><i class="fa fa-gamepad" aria-hidden="true"></i> <br />Volver al
          Juego</a
        >
      </div>
    </div>

    <script>
      $(document).ready(function () {
        const ranking = JSON.parse(localStorage.getItem('xonix_ranking')) || [];
        const body = $('#ranking-body');

        if (ranking.length === 0) {
          body.append(
            '<tr><td colspan="4" style="text-align:center; padding: 20px; color: var(--neon-accent-pink);">No records yet</td></tr>',
          );
        } else {
          ranking.slice(0, 5).forEach((entry, index) => {
            body.append(`
                        <tr style="text-align: center; border-bottom: 1px solid #333;">
                            <td style="padding: 10px; color: var(--neon-accent-blue); font-weight: bold;">${index + 1}</td>
                            <td>${entry.name}</td>
                            <td style="color: var(--neon-accent-pink);">${entry.score}</td>
                            <td>${entry.date}</td>
                        </tr>
                    `);
          });
        }
      });
    </script>
  </body>
</html>
